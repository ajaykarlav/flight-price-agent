name: Flight Price Tracker

on:
  push:
    branches:
      - main
  schedule:
    - cron: "43 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-flight-price:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Flight Agent
        timeout-minutes: 2
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
        run: python -u app.py

      - name: Save price state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add price_state.json
          git commit -m "update price state" || echo "No price state changes"
          git push
